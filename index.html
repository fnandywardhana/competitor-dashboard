<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Competitor Intelligence</title>
<style>
:root{
  --bg:#faf9f5;--surface:#fff;--alt:#f1efe8;
  --border:rgba(0,0,0,0.1);--border-s:rgba(0,0,0,0.18);
  --text:#1a1a18;--muted:#5f5e5a;--faint:#888780;
  --purple:#534ab7;--purple-bg:#eeedfe;--purple-tx:#3c3489;
  --teal:#0f6e56;--teal-bg:#e1f5ee;--teal-tx:#085041;
  --coral:#993c1d;--amber:#ba7517;--amber-bg:#faeeda;
  --r:12px;--rs:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1918;--surface:#252422;--alt:#2e2c2a;
  --border:rgba(255,255,255,0.08);--border-s:rgba(255,255,255,0.18);
  --text:#f1efe8;--muted:#a8a69f;--faint:#6b6a65;
  --purple:#afa9ec;--purple-bg:#26215c;--purple-tx:#cecbf6;
  --teal:#5dcaa5;--teal-bg:#04342c;--teal-tx:#9fe1cb;
  --coral:#f0997b;--amber:#ef9f27;--amber-bg:#412402;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:20px 16px}
h1{font-size:21px;font-weight:500}
h2{font-size:17px;font-weight:500}
h3{font-size:15px;font-weight:500}
p{font-size:14px}
a{color:var(--purple);text-decoration:none}

/* Nav */
.nav{position:sticky;top:0;background:var(--bg);border-bottom:0.5px solid var(--border);padding:12px 16px;z-index:99;display:flex;align-items:center;justify-content:space-between;gap:8px}
.nav-title{font-size:16px;font-weight:500}
.nav-sub{font-size:11px;color:var(--faint)}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:0;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{white-space:nowrap;font-family:inherit;font-size:13px;padding:6px 14px;background:var(--surface);color:var(--text);border:0.5px solid var(--border-s);border-radius:20px;cursor:pointer;transition:background .15s,color .15s;flex-shrink:0}
.tabs button:hover{background:var(--alt)}
.tabs button.active{background:var(--purple);color:#fff;border-color:var(--purple)}

/* Cards */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-title{font-size:15px;font-weight:500;margin-bottom:12px}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:480px){.metrics{grid-template-columns:repeat(4,1fr)}}
.metric{background:var(--alt);border-radius:var(--rs);padding:12px}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:3px}
.metric-value{font-size:21px;font-weight:500}
.metric-sub{font-size:11px;color:var(--faint);margin-top:2px}

/* Tags */
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px}
.tag.ft{background:var(--purple-bg);color:var(--purple-tx)}
.tag.en{background:var(--teal-bg);color:var(--teal-tx)}
.tag.no{background:var(--alt);color:var(--muted)}
.badge{font-size:10px;padding:1px 7px;border-radius:20px;background:var(--alt);color:var(--muted);margin-left:5px;vertical-align:middle}
.badge.ios{background:var(--purple-bg);color:var(--purple-tx)}
.badge.android{background:var(--teal-bg);color:var(--teal-tx)}

/* App grid */
.app-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:400px){.app-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:700px){.app-grid{grid-template-columns:repeat(3,1fr)}}
.app-card{background:var(--alt);border-radius:var(--rs);padding:14px;cursor:pointer;border:0.5px solid transparent;transition:border-color .15s}
.app-card:hover,.app-card:active{border-color:var(--border-s)}
.app-card-name{font-size:14px;font-weight:500;margin-bottom:4px}
.app-card-meta{font-size:11px;color:var(--faint);display:flex;gap:6px;flex-wrap:wrap}

/* App detail */
.platform-section{margin-bottom:14px}
.platform-section:last-child{margin-bottom:0}
.platform-header{font-size:13px;font-weight:500;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.version-row{padding:10px 0;border-bottom:0.5px solid var(--border)}
.version-row:last-child{border-bottom:none}
.version-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px}
.version-num{font-size:14px;font-weight:500}
.version-date{font-size:11px;color:var(--faint);white-space:nowrap}
.version-notes{font-size:13px;color:var(--muted);white-space:pre-wrap;line-height:1.5}
.lang-pill{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--purple-bg);color:var(--purple-tx);margin-right:4px;display:inline-block;margin-bottom:2px}

/* Report detail */
.app-item{padding:14px 0;border-bottom:0.5px solid var(--border)}
.app-item:last-child{border-bottom:none}
.app-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.feature-list{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.feature-item{font-size:13px;color:var(--muted);padding:6px 10px;border-left:2px solid var(--border);border-radius:0 var(--rs) var(--rs) 0;background:var(--alt)}
.feature-item.ft{border-left-color:var(--purple)}
.feature-item.en{border-left-color:var(--teal)}
.signal{background:var(--alt);border-radius:var(--rs);padding:10px 12px;font-size:13px;margin-top:8px;line-height:1.5}
.implication{font-size:12px;color:var(--purple-tx);margin-top:5px}
.pattern{background:var(--amber-bg);border-radius:var(--rs);padding:12px;font-size:13px;line-height:1.6;border-left:3px solid var(--amber)}

/* Archive */
.report-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border);cursor:pointer;gap:8px}
.report-row:last-child{border-bottom:none}
.report-row:active .rdlabel{color:var(--purple)}
.rdlabel{font-size:14px;font-weight:500;transition:color .15s}
.rmeta{font-size:12px;color:var(--muted);margin-top:2px}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.pill{font-size:11px;padding:2px 8px;background:var(--alt);border-radius:20px;color:var(--muted)}

/* Filter bar */
.fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.fbar select{font-family:inherit;font-size:13px;padding:6px 10px;background:var(--surface);color:var(--text);border:0.5px solid var(--border-s);border-radius:var(--rs)}
.fbar button{font-family:inherit;font-size:13px;padding:6px 14px;background:var(--surface);color:var(--text);border:0.5px solid var(--border-s);border-radius:var(--rs);cursor:pointer}
.fbar button:hover{background:var(--alt)}

/* Compare */
.cmp-grid{display:grid;gap:10px;grid-template-columns:1fr}
@media(min-width:480px){.cmp-grid{grid-template-columns:1fr 1fr}}
.cmp-card{background:var(--alt);border-radius:var(--rs);padding:14px}
.cmp-val{font-size:18px;font-weight:500}

/* Back btn */
.back-btn{font-family:inherit;font-size:13px;padding:7px 14px;background:var(--surface);color:var(--text);border:0.5px solid var(--border-s);border-radius:var(--rs);cursor:pointer;margin-bottom:14px}
.back-btn:hover{background:var(--alt)}

/* States */
.loading,.empty{text-align:center;padding:48px 16px;color:var(--muted);font-size:14px}
.err{text-align:center;padding:48px 16px;color:var(--coral);font-size:14px}
</style>
</head>
<body>

<div class="nav">
  <div>
    <div class="nav-title">Competitor Intelligence</div>
    <div class="nav-sub" id="last-update">Banking apps Indonesia</div>
  </div>
</div>

<div class="wrap">
  <div class="tabs" style="margin-bottom:16px">
    <button id="tab-latest" class="active" onclick="showTab('latest')">Terbaru</button>
    <button id="tab-archive" onclick="showTab('archive')">Arsip</button>
    <button id="tab-apps" onclick="showTab('apps')">Per aplikasi</button>
    <button id="tab-compare" onclick="showTab('compare')">Bandingkan</button>
  </div>
  <div id="content"><div class="loading">Memuat data...</div></div>
</div>

<script>
let INDEX = [], REPORTS = {}, HISTORY = null;
const API = '/api';

async function get(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function getReport(d) {
  if (!REPORTS[d]) REPORTS[d] = await get('/report/' + d);
  return REPORTS[d];
}
async function getHistory() {
  if (!HISTORY) HISTORY = await get('/history');
  return HISTORY;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmt(iso, short) {
  if (!iso) return '?';
  try {
    return new Date(iso).toLocaleDateString('id-ID',
      short ? {day:'numeric',month:'short',year:'numeric'}
             : {day:'numeric',month:'long',year:'numeric'});
  } catch { return iso; }
}

function showTab(t) {
  ['latest','archive','apps','compare'].forEach(x =>
    document.getElementById('tab-'+x).classList.toggle('active', x === t));
  const fn = {latest:renderLatest,archive:renderArchive,apps:renderApps,compare:renderCompare};
  fn[t]();
}

/* ── TERBARU ── */
async function renderLatest() {
  const el = c();
  if (!INDEX.length) { el.innerHTML = '<div class="empty">Belum ada laporan.</div>'; return; }
  try {
    const r = await getReport(INDEX[0].date);
    renderReportDetail(r, false);
  } catch(e) { el.innerHTML = err(e); }
}

function renderReportDetail(report, showBack) {
  const el = c();
  const an = report.analysis || {};
  const apps = an.apps || [];
  const sig = apps.filter(a => a.has_significant_update);
  const feat = apps.reduce((s,a) => s+(a.new_features||[]).length,0);
  const enh  = apps.reduce((s,a) => s+(a.enhancements||[]).length,0);

  let h = '';
  if (showBack) h += `<button class="back-btn" onclick="showTab('archive')">← Kembali</button>`;

  h += `<div style="font-size:12px;color:var(--muted);margin-bottom:10px">
    Periode: ${fmt(report.period_start,1)} — ${fmt(report.period_end,1)}
  </div>
  <div class="metrics">
    <div class="metric"><div class="metric-label">App dipantau</div><div class="metric-value">${report.app_count}</div></div>
    <div class="metric"><div class="metric-label">Ada update</div><div class="metric-value">${sig.length}</div><div class="metric-sub">dari ${apps.length} dianalisis</div></div>
    <div class="metric"><div class="metric-label">Fitur baru</div><div class="metric-value">${feat}</div></div>
    <div class="metric"><div class="metric-label">Enhancement</div><div class="metric-value">${enh}</div></div>
  </div>`;

  if (an.cross_pattern) h += `<div class="card">
    <div class="card-title">🔭 Pattern minggu ini</div>
    <div class="pattern">${esc(an.cross_pattern)}</div>
    ${an.industry_direction ? `<div style="font-size:12px;color:var(--muted);margin-top:8px;font-style:italic">${esc(an.industry_direction)}</div>`:''}
  </div>`;

  h += `<div class="card"><div class="card-title">Analisis per aplikasi</div>`;
  const sorted = [...apps].sort((a,b) => (b.has_significant_update?1:0)-(a.has_significant_update?1:0));
  for (const app of sorted) {
    const pb = app.platform === 'ios' ? '<span class="badge ios">iOS</span>' : '<span class="badge android">Android</span>';
    h += `<div class="app-item">
      <div class="app-head">
        <span style="font-size:14px;font-weight:500">${esc(app.app_title)}${pb}</span>
        ${app.has_significant_update ? '<span class="tag ft">Update</span>' : '<span class="tag no">Tidak ada update</span>'}
      </div>`;
    if (app.has_significant_update) {
      const all = (app.new_features||[]).map(x=>({t:x,c:'ft',l:'Fitur baru'}))
        .concat((app.enhancements||[]).map(x=>({t:x,c:'en',l:'Enhancement'})))
        .concat((app.notable_fixes||[]).map(x=>({t:x,c:'',l:'Fix penting'})));
      if (all.length) h += `<div class="feature-list">${all.map(f=>`<div class="feature-item ${f.c}"><span class="tag ${f.c}" style="margin-right:6px">${f.l}</span>${esc(f.t)}</div>`).join('')}</div>`;
      if (app.strategic_signal) h += `<div class="signal">🎯 ${esc(app.strategic_signal)}${app.implication?`<div class="implication">💡 ${esc(app.implication)}</div>`:''}</div>`;
    }
    h += `</div>`;
  }
  h += `</div>`;
  el.innerHTML = h;
}

/* ── ARSIP ── */
async function renderArchive() {
  const el = c();
  if (!INDEX.length) { el.innerHTML='<div class="empty">Belum ada laporan.</div>'; return; }
  const years = [...new Set(INDEX.map(r=>r.date.slice(0,4)))].sort().reverse();
  const months=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  el.innerHTML = `<div class="card">
    <div class="card-title">Semua laporan mingguan</div>
    <div class="fbar">
      <select id="fy" onchange="filterArch()">
        <option value="">Semua tahun</option>
        ${years.map(y=>`<option value="${y}">${y}</option>`).join('')}
      </select>
      <select id="fm" onchange="filterArch()">
        <option value="">Semua bulan</option>
        ${months.map((m,i)=>`<option value="${String(i+1).padStart(2,'0')}">${m}</option>`).join('')}
      </select>
    </div>
    <div id="rlist"></div>
  </div>`;
  renderRlist(INDEX);
}
function filterArch() {
  const y=document.getElementById('fy').value, m=document.getElementById('fm').value;
  renderRlist(INDEX.filter(r=>(!y||r.date.startsWith(y))&&(!m||r.date.slice(5,7)===m)));
}
function renderRlist(items) {
  const el = document.getElementById('rlist');
  if (!items.length) { el.innerHTML='<div class="empty" style="padding:24px">Tidak ada laporan.</div>'; return; }
  el.innerHTML = items.map(r=>`
    <div class="report-row" onclick="openReport('${r.date}')">
      <div>
        <div class="rdlabel">${fmt(r.date)}</div>
        <div class="rmeta">${fmt(r.period_start,1)} — ${fmt(r.period_end,1)} · ${r.app_count} app</div>
        ${(r.top_movers||[]).length?`<div class="pills">${r.top_movers.slice(0,4).map(m=>`<span class="pill">${esc(m)}</span>`).join('')}</div>`:''}
      </div>
      <div style="color:var(--faint);font-size:20px">›</div>
    </div>`).join('');
}
async function openReport(date) {
  ['latest','archive','apps','compare'].forEach(t =>
    document.getElementById('tab-'+t).classList.toggle('active', t === 'archive'));
  c().innerHTML='<div class="loading">Memuat...</div>';
  try { renderReportDetail(await getReport(date), true); }
  catch(e) { c().innerHTML = err(e); }
}

/* ── PER APLIKASI (grouped by name) ── */
async function renderApps() {
  const el = c();
  try {
    const history = await getHistory();
    const rawApps = history.apps || [];
    if (!rawApps.length) { el.innerHTML='<div class="empty">Belum ada data.</div>'; return; }

    // Group by app name — kalau iOS dan Android punya nama yang sama, gabungkan
    const groups = {};
    for (const app of rawApps) {
      const name = app.app_title || app.app_id;
      if (!groups[name]) groups[name] = { name, platforms: [] };
      groups[name].platforms.push(app);
    }

    const sorted = Object.values(groups).sort((a,b) => a.name.localeCompare(b.name));

    el.innerHTML = `<div class="card">
      <div class="card-title">Semua aplikasi</div>
      <div class="app-grid">
        ${sorted.map(g => {
          const totalVer = g.platforms.reduce((s,p)=>s+p.versions.length,0);
          const platBadges = g.platforms.map(p=>
            `<span class="badge ${p.platform}">${p.platform}</span>`).join(' ');
          return `<div class="app-card" onclick="renderAppDetail(${JSON.stringify(g.name)})">
            <div class="app-card-name">${esc(g.name)}</div>
            <div class="app-card-meta">
              ${platBadges}
              <span>${totalVer} versi</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  } catch(e) { el.innerHTML = err(e); }
}

async function renderAppDetail(groupName) {
  c().innerHTML='<div class="loading">Memuat...</div>';
  try {
    const history = await getHistory();
    const apps = (history.apps||[]).filter(a=>(a.app_title||a.app_id)===groupName);
    if (!apps.length) return;

    let h = `<button class="back-btn" onclick="renderApps()">← Kembali</button>
    <div class="card">
      <div class="card-title" style="margin-bottom:16px">${esc(groupName)}</div>`;

    for (const app of apps.sort((a,b)=>a.platform.localeCompare(b.platform))) {
      const versions = [...app.versions].sort((a,b)=>
        (b.updated_on||b.captured_at||'').localeCompare(a.updated_on||a.captured_at||''));
      const pbLabel = app.platform === 'ios' ? '📱 iOS' : '🤖 Android';
      h += `<div class="platform-section">
        <div class="platform-header">
          <span class="badge ${app.platform}">${pbLabel}</span>
          <span style="font-size:12px;color:var(--faint)">${versions.length} versi · ${app.app_id}</span>
        </div>`;
      for (const v of versions) {
        const d = v.updated_on || v.captured_at;
        let notes = '';
        if (v.notes_by_lang && Object.keys(v.notes_by_lang).length > 0) {
          notes = Object.entries(v.notes_by_lang).map(([lang,txt])=>
            `<div style="margin-top:5px"><span class="lang-pill">${lang.toUpperCase()}</span><span class="version-notes" style="display:inline">${esc(txt)}</span></div>`).join('');
        } else {
          notes = `<div class="version-notes">${esc(v.release_notes||'(no release notes)')}</div>`;
        }
        h += `<div class="version-row">
          <div class="version-head">
            <span class="version-num">v${esc(v.version)}</span>
            <span class="version-date">${fmt(d,1)}</span>
          </div>
          ${notes}
        </div>`;
      }
      h += `</div>`;
    }
    h += `</div>`;
    c().innerHTML = h;
  } catch(e) { c().innerHTML = err(e); }
}

/* ── BANDINGKAN ── */
async function renderCompare() {
  const el = c();
  if (INDEX.length < 2) { el.innerHTML='<div class="empty">Perlu minimal 2 laporan.</div>'; return; }
  const opts = INDEX.map(r=>`<option value="${r.date}">${fmt(r.date,1)}</option>`).join('');
  el.innerHTML = `<div class="card">
    <div class="card-title">Bandingkan dua periode</div>
    <div class="fbar">
      <select id="ca">${opts}</select>
      <select id="cb">${opts}</select>
      <button onclick="doCompare()">Bandingkan</button>
    </div>
    <div id="cr" style="font-size:13px;color:var(--muted)">Pilih dua periode lalu klik Bandingkan.</div>
  </div>`;
  if (INDEX.length > 1) document.getElementById('cb').value = INDEX[1].date;
}
async function doCompare() {
  const dA=document.getElementById('ca').value, dB=document.getElementById('cb').value;
  if (!dA||!dB||dA===dB){document.getElementById('cr').textContent='Pilih dua periode berbeda.';return;}
  document.getElementById('cr').innerHTML='<div class="loading" style="padding:16px">Memuat...</div>';
  try {
    const [rA,rB] = await Promise.all([getReport(dA),getReport(dB)]);
    const stat = r => ({
      feat: (r.analysis?.apps||[]).reduce((s,a)=>s+(a.new_features||[]).length,0),
      enh:  (r.analysis?.apps||[]).reduce((s,a)=>s+(a.enhancements||[]).length,0),
      apps: (r.analysis?.apps||[]).filter(a=>a.has_significant_update).map(a=>a.app_title),
      pat:  r.analysis?.cross_pattern||'-',
    });
    const sA=stat(rA), sB=stat(rB);
    document.getElementById('cr').innerHTML = `
      <div class="cmp-grid">
        ${[[rA,sA],[rB,sB]].map(([r,s])=>`
          <div class="cmp-card">
            <div style="font-weight:500;margin-bottom:8px">${fmt(r.report_date,1)}</div>
            <div style="font-size:13px;color:var(--muted);line-height:2">
              Fitur baru: <span class="cmp-val" style="color:var(--purple-tx)">${s.feat}</span><br>
              Enhancement: <span class="cmp-val" style="color:var(--teal-tx)">${s.enh}</span><br>
              App aktif: <span class="cmp-val">${s.apps.length}</span>
            </div>
            <div style="font-size:11px;color:var(--faint);margin-top:6px">${s.apps.join(', ')||'—'}</div>
          </div>`).join('')}
      </div>
      <div style="font-size:12px;color:var(--faint);margin-top:12px;line-height:1.7">
        <b>Pattern ${fmt(dA,1)}:</b> ${esc(sA.pat)}<br><br>
        <b>Pattern ${fmt(dB,1)}:</b> ${esc(sB.pat)}
      </div>`;
  } catch(e) { document.getElementById('cr').innerHTML=err(e); }
}

/* ── Helpers ── */
function c() { return document.getElementById('content'); }
function err(e) { return `<div class="err">Gagal memuat: ${esc(e.message)}</div>`; }

async function init() {
  try {
    INDEX = await get('/index');
    if (INDEX.length) {
      document.getElementById('last-update').textContent =
        'Update: ' + fmt(INDEX[0].date,1) + ' · iOS + Android';
    }
    showTab('latest');
  } catch(e) {
    c().innerHTML = `<div class="err">Gagal memuat data: ${esc(e.message)}.<br><br>Cek environment variables Cloudflare.</div>`;
  }
}
init();
</script>
